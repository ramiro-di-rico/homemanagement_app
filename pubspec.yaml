name: home_management_app
description: A new Flutter project.
version: 1.0.10+11

environment:
  sdk: ^3.9.0
  flutter: ^3.35.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  fl_chart: ^1.2.0
  encrypt: ^5.0.3
  shared_preferences: ^2.5.4
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  intl: ^0.20.2
  datetime_picker_formfield: ^2.0.1
  flutter_speed_dial: ^7.0.0
  flip_card: ^0.7.0
  local_auth: ^3.0.1
  # Migrate from deprecated package_info to package_info_plus to support latest Android Gradle Plugin requirements
  package_info_plus: ^9.0.0
  flutter_slidable: ^4.0.3
  grouped_list: ^6.0.0
  logger: ^2.7.0
  uuid: ^4.5.3
  skeletonizer: ^2.1.3
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  go_router: ^17.1.0
  flutter_colorpicker: ^1.1.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  msix: ^3.16.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    fill_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
